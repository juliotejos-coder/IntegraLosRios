<style>

/* =============================================
   VARIABLES Y TEMA
   ============================================= */
:root {
  --bg:      #ECE8E0;
  --card:    #fff;
  --text:    #333;
  --accent:  #5587D4;
  --btn:     #5587D4;
  --purple:  #B075AE;
  --pink:    #EB79A7;
  --green:   #4DB38B;
  --orange:  #FFA455;
}
body.dark {
  --bg:    #000;
  --card:  #1a1a1a;
  --text:  #eaeaea;
  --accent:#FFA455;
  --btn:   #FFA455;
}

/* =============================================
   BASE
   ============================================= */
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
}

/* =============================================
   BANNER SUPERIOR — 100% responsive sin franjas
   La imagen siempre llena el espacio con cover.
   ============================================= */
.topbanner {
  width: 100%;
  overflow: hidden;
  background: #111;
}

.topbanner img {
  width: 100%;
  height: auto;
  display: block;
}

/* =============================================
   MENÚ DE COMUNAS
   ============================================= */
.topmenu {
  display: flex;
  gap: 10px;
  overflow-x: auto;
  padding: 12px;
  margin-top: 0;
  border-bottom: 1px solid rgba(255,255,255,0.2);
  background: rgba(255,255,255,0.3);
  backdrop-filter: blur(12px);
}
.topmenu button {
  background: var(--accent);
  color: white;
  border: 3px solid transparent;
  padding: 12px 22px;
  border-radius: 22px;
  font-weight: bold;
  white-space: nowrap;
  cursor: pointer;
  transition: .35s;
}
body:not(.dark) .topmenu button:hover { background: var(--pink); }
body.dark       .topmenu button:hover { background: var(--green); color: #000; }
.topmenu button.active                { background: var(--purple); border-color: var(--pink); }
body.dark .topmenu button.active      { background: var(--orange); border-color: var(--pink); color: #000; }

@media (max-width: 600px) {
  .topmenu         { padding: 8px 6px; }
  .topmenu button  { padding: 10px 14px; font-size: 14px; border-radius: 18px; }
}

/* =============================================
   GRILLA DE TARJETAS
   ============================================= */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 16px;
  padding: 16px;
}
.card {
  background: var(--card);
  padding: 16px;
  border-radius: 14px;
  box-shadow: 0 4px 10px rgba(0,0,0,.12);
  border-left: 6px solid var(--accent);
  animation: fadeZoom .6s ease forwards;
  overflow: hidden;
  word-break: break-word;
  overflow-wrap: break-word;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
@keyframes fadeZoom {
  from { opacity: 0; transform: scale(.96); }
  to   { opacity: 1; transform: scale(1); }
}
.card h3 { font-size: 18px; margin: 0; }

/* Tabla interna de datos: 2 columnas (label | valor) */
.card-info {
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 2px 8px;
  font-size: 13px;
  line-height: 1.55;
}
.card-info .lbl {
  font-weight: bold;
  white-space: nowrap;
  color: var(--text);
}
.card-info .val {
  word-break: break-word;
  overflow-wrap: break-word;
}

/* Badge tardes */
.badge-program {
  display: inline-flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 4px;
  font-size: 13px;
  cursor: help;
  text-decoration: underline dotted;
  text-underline-offset: 3px;
  white-space: normal;
  word-break: break-word;
}

@media (max-width: 600px) {
  .grid { padding: 10px; gap: 10px; }
  .card { padding: 13px; }
  .card h3 { font-size: 14px; }
  .card-info { font-size: 12px; }
}

/* =============================================
   BOTÓN GOOGLE MAPS
   ============================================= */
.btn {
  display: inline-block;
  margin-top: 6px;
  padding: 8px 18px;
  border-radius: 16px;
  font-size: 14px;
  background: var(--btn);
  color: white;
  text-decoration: none;
  transition: .3s;
}
body:not(.dark) .btn:hover { background: #5587D4; }
body.dark       .btn:hover { background: #FFA455; color: #000; }

/* Tooltip flotante global — posicionado por JS, no atrapado en .card */
#tip-box {
  display: none;
  position: fixed;
  z-index: 99998;
  max-width: 280px;
  background: rgba(20,20,20,.95);
  color: #fff;
  padding: 11px 14px;
  border-radius: 11px;
  font-size: 12px;
  line-height: 1.55;
  box-shadow: 0 6px 20px rgba(0,0,0,.4);
  pointer-events: none;
  white-space: normal;
}
#tip-box.visible { display: block; }

/* =============================================
   BANNER DE INSTALACIÓN PWA
   ============================================= */
#pwa-banner {
  display: none;
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 99999;
  background: var(--card);
  border-top: 3px solid var(--accent);
  box-shadow: 0 -4px 20px rgba(0,0,0,.25);
  padding: 14px 16px;
  align-items: center;
  gap: 12px;
  animation: slideUp .4s ease;
}
#pwa-banner.show { display: flex; }
@keyframes slideUp {
  from { transform: translateY(100%); opacity: 0; }
  to   { transform: translateY(0);    opacity: 1; }
}
#pwa-banner img  { width: 48px; height: 48px; border-radius: 10px; flex-shrink: 0; }
#pwa-banner .pwa-text { flex: 1; }
#pwa-banner .pwa-text strong { display: block; font-size: 15px; margin-bottom: 2px; }
#pwa-banner .pwa-text span   { font-size: 12px; opacity: .75; }
#pwa-banner .pwa-install {
  background: var(--accent);
  color: #fff;
  border: none;
  padding: 9px 16px;
  border-radius: 20px;
  font-weight: bold;
  cursor: pointer;
  white-space: nowrap;
  font-size: 13px;
}
#pwa-banner .pwa-close {
  background: none;
  border: none;
  font-size: 20px;
  cursor: pointer;
  color: var(--text);
  padding: 4px 6px;
  flex-shrink: 0;
}
/* iOS: instrucción especial */
#pwa-ios-hint {
  display: none;
  position: fixed;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 99999;
  background: rgba(0,0,0,.88);
  color: #fff;
  padding: 12px 18px;
  border-radius: 14px;
  font-size: 13px;
  text-align: center;
  max-width: 280px;
  line-height: 1.5;
  box-shadow: 0 4px 20px rgba(0,0,0,.4);
}
#pwa-ios-hint::after {
  content: "";
  position: absolute;
  bottom: -8px;
  left: 50%;
  transform: translateX(-50%);
  border: 8px solid transparent;
  border-bottom: 0;
  border-top-color: rgba(0,0,0,.88);
}
#pwa-ios-hint.show { display: block; }
.info-icon {
  position: fixed;
  bottom: 12px;
  right: 14px;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: rgba(255,255,255,.35);
  backdrop-filter: blur(8px);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 17px;
  color: var(--text);
  cursor: pointer;
  z-index: 10000;
  border: 1px solid rgba(255,255,255,.4);
}
body.dark .info-icon { background: rgba(255,255,255,.35); }

.info-icon .tooltip {
  position: absolute;
  bottom: 38px;
  right: 0;
  padding: 10px 14px;
  background: rgba(0,0,0,0.45);
  backdrop-filter: blur(12px);
  border-radius: 10px;
  font-size: 12px;
  border: 1px solid rgba(0,0,0,0.45);
  white-space: nowrap;
  color: var(--text);
  min-width: 180px;
  opacity: 0;
  pointer-events: none;
  transform: translateY(10px) scale(.96);
  transition: opacity .35s ease, transform .45s cubic-bezier(.22,1,.36,1);
}
body.dark .info-icon .tooltip { background: rgba(0,0,0,0.45); }

.info-icon.active .tooltip {
  opacity: 1;
  transform: translateY(0) scale(1);
  pointer-events: auto;

.tooltip-title { font-weight: bold; margin-bottom: 2px; }
.tooltip-year  { font-size: 11px; opacity: .8; margin-bottom: 6px; }
.tooltip-ig {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  text-decoration: none;
  color: var(--accent);
  font-weight: bold;

  line-height: 1.6;

.tooltip-ig svg { width: 20px; height: 20px; min-width: 20px; }

@media (max-width: 600px) {
  .info-icon .tooltip { max-width: 90vw; }
  .tooltip-ig         { gap: 10px; font-size: 14px; }
  .tooltip-igeoin     { gap: 10px; font-size: 14px; }
}

/* ============================================================
   FILTRO DE COMUNAS
   ============================================================ */
function filtrar(comuna, btnActivo) {
  document.querySelectorAll(".topmenu button").forEach(b => b.classList.remove("active"));
  if (btnActivo) btnActivo.classList.add("active");

  document.querySelectorAll(".card").forEach(card => {
    const visible = (comuna === "Todos" || card.dataset.comuna === comuna);
    card.style.display = visible ? "block" : "none";
  });
}


/* ============================================================
   ÍCONO INFO — ACCESIBLE
   ============================================================ */
(function () {
  const icon = document.getElementById("infoIcon");
  if (!icon) return;

  const open  = () => { icon.classList.add("active");    icon.setAttribute("aria-expanded", "true"); };
  const close = () => { icon.classList.remove("active"); icon.setAttribute("aria-expanded", "false"); };
  const toggle = () => icon.classList.contains("active") ? close() : open();

  icon.addEventListener("click",   e => { e.stopPropagation(); toggle(); });
  icon.addEventListener("keydown", e => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); toggle(); } });
  document.addEventListener("keydown", e => { if (e.key === "Escape") close(); });
  document.addEventListener("click",   e => { if (!icon.contains(e.target)) close(); });
})();

/* ============================================================
   PWA — INSTALACIÓN AUTOMÁTICA
   Detecta Android (beforeinstallprompt) o iOS (Safari)
   ============================================================ */
(function () {
  const banner      = document.getElementById("pwa-banner");
  const installBtn  = document.getElementById("pwa-install-btn");
  const closeBtn    = document.getElementById("pwa-close-btn");
  const iosHint     = document.getElementById("pwa-ios-hint");

  // Ya fue descartado antes → no volver a mostrar
  if (sessionStorage.getItem("pwa-dismissed")) return;

  // ── Android / Chrome / Edge (prompt nativo) ─────────────
  let deferredPrompt = null;

  window.addEventListener("beforeinstallprompt", e => {
    e.preventDefault();
    deferredPrompt = e;
    // Mostrar banner con pequeño retraso para no interrumpir la carga
    setTimeout(() => banner.classList.add("show"), 2500);
  });

  installBtn.addEventListener("click", async () => {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    deferredPrompt = null;
    banner.classList.remove("show");
    if (outcome === "accepted") sessionStorage.setItem("pwa-dismissed", "1");
  });

  // ── iOS / Safari ─────────────────────────────────────────
  const isIOS       = /iphone|ipad|ipod/i.test(navigator.userAgent);
  const isSafari    = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);
  const isStandalone = ("standalone" in navigator && navigator.standalone);

  if (isIOS && isSafari && !isStandalone) {
    setTimeout(() => {
      banner.classList.add("show");
      installBtn.textContent = "¿Cómo?";
    }, 2500);

    installBtn.addEventListener("click", () => {
      iosHint.classList.toggle("show");
    });

    // Ocultar hint al tocar fuera
    document.addEventListener("click", e => {
      if (!iosHint.contains(e.target) && e.target !== installBtn) {
        iosHint.classList.remove("show");
      }
    }, true);
  }

  // ── Cerrar banner ─────────────────────────────────────────
  closeBtn.addEventListener("click", () => {
    banner.classList.remove("show");
    iosHint.classList.remove("show");
    sessionStorage.setItem("pwa-dismissed", "1");
  });

  // ── Si ya está instalada no mostrar nada ──────────────────
  window.addEventListener("appinstalled", () => {
    banner.classList.remove("show");
    sessionStorage.setItem("pwa-dismissed", "1");
  });
})();


/* ============================================================
   TOOLTIP FLOTANTE — "Con/Sin Tardes de Juego"
   Usa un div fixed para no quedar atrapado en .card
   ============================================================ */
(function () {
  const tip = document.getElementById("tip-box");

  function show(el) {
    tip.textContent = el.dataset.tip;
    tip.classList.add("visible");
    position(el);
  }
  function hide() {
    tip.classList.remove("visible");
  }

  function position(el) {
    const rect    = el.getBoundingClientRect();
    const tipW    = 280;
    const margin  = 8;
    const gap     = 10;  // espacio entre badge y tooltip

    // Preferencia: aparecer ARRIBA del badge
    let top  = rect.top - tip.offsetHeight - gap;
    let left = rect.left;

    // Si no cabe arriba → aparece abajo
    if (top < margin) top = rect.bottom + gap;

    // No salirse por la derecha
    if (left + tipW > window.innerWidth - margin) {
      left = window.innerWidth - tipW - margin;
    }
    // No salirse por la izquierda
    if (left < margin) left = margin;

    tip.style.top  = top  + "px";
    tip.style.left = left + "px";
  }

  document.querySelectorAll(".badge-program").forEach(el => {
    // Desktop: hover
    el.addEventListener("mouseenter", () => show(el));
    el.addEventListener("mouseleave", hide);
    // Móvil: tap
    el.addEventListener("click", e => {
      e.stopPropagation();
      tip.classList.contains("visible") ? hide() : show(el);
    });
  });

  // Tap fuera oculta el tooltip
  document.addEventListener("click", hide);
})();
